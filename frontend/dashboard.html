<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Finora</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>
  <body class="dashboard-page">
    <div id="dashboard-app" class="dashboard-shell page-transition">
      <aside id="sidebar" class="sidebar glass-card"></aside>
      <div id="sidebar-overlay" class="sidebar-overlay"></div>
      <main class="dashboard-main">
        <header class="dashboard-header glass-card reveal">
          <div>
            <p class="eyebrow">Project Management</p>
            <h1 id="dashboard-title">Mayur Dashboard</h1>
          </div>
          <div class="header-actions">
            <input type="month" id="dashboard-month-selector" class="glass-input" style="padding: 0.5rem; border-radius: 8px; border: 1px solid var(--line); background: var(--card-bg); color: var(--text);" title="Select Month for Dashboard" />
            <button id="theme-toggle" class="ghost-button icon-button" type="button">Theme</button>
            <button id="menu-toggle" class="ghost-button icon-button mobile-only" type="button">Menu</button>
          </div>
        </header>

        <section class="summary-grid">
          <article class="glass-card metric-card reveal"><span>Total Income</span><strong data-counter="income">$0.00</strong></article>
          <article class="glass-card metric-card reveal"><span>Total Expenses</span><strong data-counter="expense">$0.00</strong></article>
          <article class="glass-card metric-card reveal"><span>Balance</span><strong data-counter="balance" style="color: var(--accent);">$0.00</strong></article>
          <article class="glass-card metric-card reveal"><span>Overall Budget</span><strong data-counter="budget" style="color: var(--text);">$0.00</strong></article>
        </section>

        <section class="dashboard-grid">
          <article class="glass-card wide-card reveal" id="burndown-card">
            <div class="card-head">
              <h2>Income & Expense Trends</h2>
            </div>
            <div class="chart-shell" id="burndown-chart-shell">
              <canvas id="burndownChart"></canvas>
            </div>
          </article>

          <article class="glass-card chart-card reveal">
            <div class="card-head"><h2>Monthly Expenses</h2></div>
            <div class="chart-shell" id="expenses-bar-chart-shell">
              <canvas id="monthlyExpensesChart"></canvas>
            </div>
          </article>

          <article class="glass-card chart-card reveal">
            <div class="card-head"><h2>Budget utilization</h2></div>
            <div id="budget-rings" class="budget-rings skeleton"></div>
          </article>

          <article class="glass-card wide-card reveal">
            <div class="card-head">
              <h2>Recent transactions</h2>
              <button id="open-budget-modal" type="button" class="ghost-button">Set budget</button>
            </div>
            <div id="transactions-list" class="transactions-list skeleton"></div>
          </article>
        </section>
      </main>
    </div>

    <button id="quick-add-button" class="floating-add" type="button">+</button>

    <div id="transaction-modal" class="modal-shell">
      <div class="modal-card glass-card">
        <div class="card-head">
          <h2>Add transaction</h2>
          <button class="ghost-button" data-close-modal="transaction-modal" type="button">Close</button>
        </div>
        <form id="transaction-form" class="stack-form">
          <div class="form-row">
            <label><span>Amount</span><input name="amount" type="number" min="0.01" step="0.01" required /></label>
            <label>
              <span>Type</span>
              <select name="type" required>
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label><span>Category</span><input name="category" type="text" maxlength="40" required /></label>
            <label><span>Date</span><input name="date" type="date" required /></label>
          </div>
          <label><span>Description</span><input name="description" type="text" maxlength="120" required /></label>
          <button type="submit" class="primary-button full-width">Save transaction</button>
        </form>
      </div>
    </div>

    <div id="budget-modal" class="modal-shell">
      <div class="modal-card glass-card">
        <div class="card-head">
          <h2>Set budget</h2>
          <button class="ghost-button" data-close-modal="budget-modal" type="button">Close</button>
        </div>
        <form id="budget-form" class="stack-form">
          <div class="form-row">
            <label><span>Category</span><input name="category" type="text" maxlength="40" placeholder="overall" /></label>
            <label><span>Month</span><input name="month" type="month" required /></label>
          </div>
          <label><span>Budget amount</span><input name="limitAmount" type="number" min="1" step="0.01" required /></label>
          <button type="submit" class="primary-button full-width">Save budget</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
